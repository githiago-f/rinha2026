services:

  nginx:
    image: nginx:1.29-alpine
    container_name: lb

    ports:
      - "9999:9999"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - api1
      - api2

    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "30MB"

  api1:
    image: ghcr.io/githiago-f/rinha2026:latest
    # build:
      # context: .
    hostname: api1

    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "150MB"

  api2:
    image: ghcr.io/githiago-f/rinha2026:latest
    # build:
      # context: .
    hostname: api2

    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "150MB"
