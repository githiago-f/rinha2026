worker_processes 1;

events {
    worker_connections 4096;
}

http {

    upstream backend {
        server api1:8080;
        server api2:8080;
    }

    keepalive_timeout 30;
    keepalive_requests 10000;

    sendfile on;
    tcp_nodelay on;

    server {
        listen 9999;

        location / {
            proxy_http_version 1.1;

            proxy_set_header Connection "";

            proxy_pass http://backend;
        }
    }
}
